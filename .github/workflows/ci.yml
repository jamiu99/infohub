name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: ./verify.sh

      - name: Install Electron runtime for smoke test
        run: pnpm exec install-electron

      - name: Smoke test desktop preload and IPC
        run: xvfb-run --auto-servernum pnpm smoke:desktop

  verify-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test core
        run: pnpm test:core

      - name: Build (electron-vite)
        run: pnpm build

      - name: Verify desktop bundle
        run: pnpm verify:bundle

      - name: Install Electron runtime for smoke test
        run: pnpm exec install-electron

      - name: Smoke test desktop preload and IPC
        run: pnpm smoke:desktop
